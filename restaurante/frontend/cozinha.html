<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozinha — KDS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0d0d;
    --panel:   #141414;
    --border:  #1f1f1f;
    --border2: #2d2d2d;
    --text:    #f2f0eb;
    --muted:   #555;
    --mono:    'DM Mono', monospace;
    --sans:    'DM Sans', sans-serif;

    /* status colors */
    --c-pendente:   #444;
    --c-confirmado: #1a6b3a;
    --c-preparo:    #7a3a00;
    --c-pronto:     #0a3d6b;

    --t-pendente:   #888;
    --t-confirmado: #2dbe6c;
    --t-preparo:    #f5a623;
    --t-pronto:     #3b9eff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 56px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-brand {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2dbe6c;
    animation: livepulse 2s ease-in-out infinite;
  }
  @keyframes livepulse {
    0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45,190,108,.4); }
    50%      { opacity: .7; box-shadow: 0 0 0 6px rgba(45,190,108,0); }
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .header-clock {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 2px;
    display: inline-block;
    min-width: 90px;
    text-align: right;
    /* Compositor layer próprio — mudanças internas não causam layout do pai */
    transform: translateZ(0);
  }
  .header-stat {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-stat strong {
    color: var(--text);
    font-weight: 700;
    will-change: contents;
    contain: strict;
    display: inline-block;
    min-width: 20px;
    text-align: center;
  }

  /* ── COLUNAS DE STATUS ── */
  .board {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }
  .col {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }
  .col-head.pendente   { border-color: var(--t-pendente); }
  .col-head.confirmado { border-color: var(--t-confirmado); }
  .col-head.em_preparo { border-color: var(--t-preparo); }
  .col-head.pronto     { border-color: var(--t-pronto); }

  .col-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .col-count {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    will-change: contents;
    contain: strict;
    display: inline-block;
    min-width: 28px;
    text-align: center;
  }
  .col-count.pendente   { color: var(--t-pendente);   background: rgba(136,136,136,.1); }
  .col-count.confirmado { color: var(--t-confirmado); background: rgba(45,190,108,.1); }
  .col-count.em_preparo { color: var(--t-preparo);    background: rgba(245,166,35,.1); }
  .col-count.pronto     { color: var(--t-pronto);     background: rgba(59,158,255,.1); }

  .col-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  /* ── CARD DO PEDIDO ── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 10px;
    overflow: hidden;
    transition: transform .15s, border-color .15s;
    /* Sem animation no CSS — animação de entrada aplicada via JS só em cards novos */
  }
  .card:hover { border-color: #3a3a3a; }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
  }
  .card-mesa {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    line-height: 1;
  }
  .card-meta {
    text-align: right;
  }
  .card-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: block;
  }
  .card-tempo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    margin-top: 2px;
    display: block;
    will-change: contents;
    contain: strict;
    min-width: 44px;
    text-align: right;
  }
  .card-tempo.ok     { color: var(--t-confirmado); }
  .card-tempo.warn   { color: var(--t-preparo); }
  .card-tempo.urgent { color: #ef4444; animation: blinkTempo .8s ease-in-out infinite; }
  @keyframes blinkTempo { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  .card-itens {
    padding: 10px 14px;
  }
  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .item-row:last-child { border-bottom: none; }
  .item-qty {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    min-width: 22px;
    flex-shrink: 0;
    line-height: 1.4;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-nome {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-mods {
    font-size: 11px;
    color: #ef4444;
    margin-top: 2px;
    line-height: 1.4;
  }
  .item-obs {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
    font-style: italic;
  }

  .card-obs {
    margin: 0 14px 12px;
    padding: 7px 10px;
    background: rgba(245,166,35,.07);
    border: 1px solid rgba(245,166,35,.2);
    border-radius: 6px;
    font-size: 12px;
    color: var(--t-preparo);
    line-height: 1.5;
  }

  .card-actions {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }
  .btn-acao {
    flex: 1;
    padding: 10px 8px;
    border-radius: 7px;
    border: none;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .3px;
  }
  .btn-acao:active { transform: scale(.97); }
  .btn-acao:disabled { opacity: .4; cursor: not-allowed; }

  /* Botão principal por status */
  .btn-confirmar { background: var(--t-confirmado); color: #fff; }
  .btn-confirmar:hover:not(:disabled) { background: #25a85e; }
  .btn-preparo   { background: var(--t-preparo);    color: #000; }
  .btn-preparo:hover:not(:disabled)   { background: #e0951f; }
  .btn-pronto    { background: var(--t-pronto);      color: #fff; }
  .btn-pronto:hover:not(:disabled)    { background: #2e87e0; }
  .btn-entregar  { background: var(--muted);          color: var(--text); }
  .btn-entregar:hover:not(:disabled)  { background: #666; }

  /* ── ESTADO VAZIO ── */
  .col-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--border2);
    gap: 8px;
    padding: 20px;
    text-align: center;
  }
  .col-empty-icon { font-size: 32px; opacity: .3; }
  .col-empty-txt  { font-size: 12px; font-family: var(--mono); letter-spacing: 1px; opacity: .4; }

  /* ── NOTIFICAÇÃO NOVO PEDIDO ── */
  .notif {
    position: fixed;
    top: 70px;
    right: 24px;
    background: var(--t-confirmado);
    color: #fff;
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    z-index: 999;
    transform: translateY(-20px);
    opacity: 0;
    transition: all .3s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .notif.show { transform: none; opacity: 1; }

  /* ── TELA SEM CONEXÃO ── */
  .offline-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #7a1a1a;
    color: #fca5a5;
    text-align: center;
    font-size: 13px;
    font-family: var(--mono);
    padding: 8px;
    transform: translateY(100%);
    transition: transform .3s;
  }
  .offline-bar.show { transform: none; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-brand">
    <div class="live-dot"></div>
    Cozinha — KDS
  </div>
  <div class="header-right">
    <div class="header-stat">Fila: <strong id="stat-fila">0</strong></div>
    <div class="header-stat">Prontos: <strong id="stat-prontos">0</strong></div>
    <div class="header-clock" id="relogio"></div>
  </div>
</div>

<!-- BOARD 4 COLUNAS -->
<div class="board">
  <div class="col">
    <div class="col-head pendente">
      <div class="col-label">Aguardando</div>
      <div class="col-count pendente" id="cnt-pendente">0</div>
    </div>
    <div class="col-body" id="col-pendente">
      <div class="col-empty"><div class="col-empty-icon">✓</div><div class="col-empty-txt">Tudo em dia</div></div>
    </div>
  </div>

  <div class="col">
    <div class="col-head confirmado">
      <div class="col-label">Confirmado</div>
      <div class="col-count confirmado" id="cnt-confirmado">0</div>
    </div>
    <div class="col-body" id="col-confirmado">
      <div class="col-empty"><div class="col-empty-icon">✓</div><div class="col-empty-txt">Tudo em dia</div></div>
    </div>
  </div>

  <div class="col">
    <div class="col-head em_preparo">
      <div class="col-label">Em preparo</div>
      <div class="col-count em_preparo" id="cnt-em_preparo">0</div>
    </div>
    <div class="col-body" id="col-em_preparo">
      <div class="col-empty"><div class="col-empty-icon">✓</div><div class="col-empty-txt">Nada no fogo</div></div>
    </div>
  </div>

  <div class="col">
    <div class="col-head pronto">
      <div class="col-label">Pronto p/ entregar</div>
      <div class="col-count pronto" id="cnt-pronto">0</div>
    </div>
    <div class="col-body" id="col-pronto">
      <div class="col-empty"><div class="col-empty-icon">✓</div><div class="col-empty-txt">Nenhum aguardando</div></div>
    </div>
  </div>
</div>

<!-- NOTIFICAÇÃO NOVO PEDIDO -->
<div class="notif" id="notif">🔔 Novo pedido!</div>

<!-- OFFLINE -->
<div class="offline-bar" id="offline-bar">⚠ Sem conexão — tentando reconectar...</div>

<script>
/* ════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════ */
const SUPABASE_URL  = 'https://lhrfemeunswviwzdpppp.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxocmZlbWV1bnN3dml3emRwcHBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDUzMjYsImV4cCI6MjA4ODY4MTMyNn0.JsHPjGJCCAePfCicpvP4Fk-UWTwW8ve-SXjjLQN2mb4';
const POLL_MS       = 8000; // atualiza a cada 8s (suficiente para TV)

async function supa(path, opts = {}) {
  // Não incluir Prefer default — cada chamada define o seu próprio
  const headers = {
    'apikey':        SUPABASE_ANON,
    'Authorization': 'Bearer ' + SUPABASE_ANON,
    'Content-Type':  'application/json',
  };
  // Merge de headers extras (ex: Prefer: return=minimal para PATCH)
  if (opts.headers) Object.assign(headers, opts.headers);
  const { headers: _, ...restOpts } = opts;
  const r = await fetch(SUPABASE_URL + path, { ...restOpts, headers });
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(txt || 'Erro ' + r.status);
  }
  // PATCH com return=minimal retorna 204 (sem body)
  if (r.status === 204) return null;
  return r.json();
}

/* ════════════════════════════════════════════
   ESTADO
════════════════════════════════════════════ */
let pedidosAnteriores = {}; // { id: status } — detecta novos pedidos
let tentativaErro   = 0;
let pollingHandle   = null;

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
function init() {
  // Relógio — atualiza só quando o segundo muda, alinhado ao tick do sistema
  function tickRelogio() {
    atualizarRelogio();
    // Agenda próximo tick exatamente no próximo segundo cheio (sem drift)
    const agora = Date.now();
    const msAteProximoSegundo = 1000 - (agora % 1000);
    setTimeout(tickRelogio, msAteProximoSegundo);
  }
  tickRelogio();

  // Primeira carga
  carregar();

  // Polling: usa requestAnimationFrame + setTimeout para não travar a thread de render
  function agendar() {
    pollingHandle = setTimeout(() => {
      // Só busca se a aba estiver visível — TV nunca muda, mas por segurança
      if (document.visibilityState !== 'hidden') {
        carregar().finally(agendar);
      } else {
        agendar(); // reagenda sem buscar
      }
    }, POLL_MS);
  }
  agendar();

  // Ao voltar para a aba, busca imediatamente
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      clearTimeout(pollingHandle);
      carregar().finally(agendar);
    }
  });
}

function atualizarRelogio() {
  const el  = document.getElementById('relogio');
  const txt = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  // Só escreve no DOM se o texto mudou — sem repaint quando o segundo muda mas o minuto não
  if (el.textContent !== txt) el.textContent = txt;
}

/* ════════════════════════════════════════════
   CARREGAR FILA DA COZINHA
════════════════════════════════════════════ */
async function carregar() {
  try { // retorna Promise implícita — .finally() em init() reagenda o polling
    // Busca pedidos ativos com itens e ingredientes em uma query só
    const pedidos = await supa(
      '/rest/v1/pedidos' +
      '?select=id,numero,status,created_at,mesa_id,sessao_cliente,observacao_geral,' +
      'mesas(numero),' +
      'pedido_itens(id,nome_produto,quantidade,observacao,' +
      'pedido_item_ingredientes(acao,nome_ingrediente))' +
      '&status=in.(pendente,confirmado,em_preparo,pronto)' +
      '&order=created_at.asc'
    );

    setOnline();
    detectarNovos(pedidos || []);
    renderBoard(pedidos || []);
    pedidosAnteriores = Object.fromEntries((pedidos || []).map(p => [p.id, p.status]));
  } catch(e) {
    tentativaErro++;
    if (tentativaErro >= 2) setOffline();
  }
}

function detectarNovos(pedidos) {
  pedidos.forEach(p => {
    const anterior = pedidosAnteriores[p.id];
    // Novo pedido que não existia antes (qualquer status inicial)
    const ehNovo = !anterior;
    // Ou pedido que acabou de ser confirmado (cliente enviou)
    const acabouDeChegar = anterior && anterior !== p.status && 
                           (p.status === 'pendente' || p.status === 'confirmado');
    if (ehNovo || acabouDeChegar) {
      dispararNotif(`${mesaLabel(p)} — Pedido #${p.numero}`);
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  });
}

/* ════════════════════════════════════════════
   RENDER DO BOARD
════════════════════════════════════════════ */
function renderBoard(pedidos) {
  const colunas = { pendente: [], confirmado: [], em_preparo: [], pronto: [] };
  pedidos.forEach(p => { if (colunas[p.status]) colunas[p.status].push(p); });

  // Stats — só texto, sem recriar DOM
  const fila = colunas.pendente.length + colunas.confirmado.length + colunas.em_preparo.length;
  document.getElementById('stat-fila').textContent    = fila;
  document.getElementById('stat-prontos').textContent = colunas.pronto.length;

  Object.entries(colunas).forEach(([status, lista]) => {
    document.getElementById('cnt-' + status).textContent = lista.length;
    const col = document.getElementById('col-' + status);
    diffColuna(col, lista, status);
  });

  // Atualiza só o timer dos cards já existentes (sem recriar o card inteiro)
  atualizarTimers(pedidos);
}

/*
  diffColuna — compara o que está no DOM com o que veio do servidor.
  - Pedido novo: cria o card e insere na posição correta
  - Pedido que mudou de status: veio para outra coluna, será removido desta
  - Pedido removido: some (entregue/cancelado)
  - Pedido igual: NÃO toca — sem piscar
*/
function diffColuna(col, lista, status) {
  const idsEsperados = new Set(lista.map(p => 'card-' + p.id));

  // Remove cards que saíram desta coluna
  Array.from(col.querySelectorAll('.card')).forEach(el => {
    if (!idsEsperados.has(el.id)) {
      el.style.transition = 'opacity .2s, transform .2s';
      el.style.opacity    = '0';
      el.style.transform  = 'scale(.95)';
      setTimeout(() => el.remove(), 200);
    }
  });

  if (!lista.length) {
    // Mostra vazio só se a coluna ficou realmente vazia após remoções
    setTimeout(() => {
      if (!col.querySelector('.card')) {
        col.innerHTML = vazioHtml(status);
      }
    }, 220);
    return;
  }

  // Remove placeholder de vazio se existir
  const vazio = col.querySelector('.col-empty');
  if (vazio) vazio.remove();

  // Insere cards novos, mantém os existentes
  lista.forEach((p, idx) => {
    const cardId = 'card-' + p.id;
    let el = document.getElementById(cardId);

    if (!el) {
      // Card novo — cria e anima entrada
      // Cria card novo com animação de entrada
      const tmp = document.createElement('div');
      tmp.innerHTML = cardHtml(p, status);
      const novoCard = tmp.firstElementChild;
      novoCard.style.opacity   = '0';
      novoCard.style.transform = 'translateY(10px)';
      col.appendChild(novoCard);
      requestAnimationFrame(() => {
        novoCard.style.transition = 'opacity .25s, transform .25s';
        novoCard.style.opacity    = '1';
        novoCard.style.transform  = 'none';
      });
    }
    // Se card já existe e está na coluna certa, não toca nele
  });
}

/*
  atualizarTimers — só atualiza o texto do tempo em cards existentes.
  Não recria card, não causa piscada.
*/
function atualizarTimers(pedidos) {
  pedidos.forEach(p => {
    const card = document.getElementById('card-' + p.id);
    if (!card) return;
    const tempoEl = card.querySelector('.card-tempo');
    if (!tempoEl) return;
    const mins = Math.floor((Date.now() - new Date(p.created_at).getTime()) / 60000);
    const cls  = mins < 10 ? 'ok' : mins < 20 ? 'warn' : 'urgent';
    const txt  = mins < 60 ? mins + 'min' : Math.floor(mins/60) + 'h' + (mins%60 > 0 ? (mins%60)+'m' : '');
    tempoEl.textContent = txt;
    // Só atualiza a classe se mudou — evita re-paint desnecessário
    if (!tempoEl.classList.contains(cls)) {
      tempoEl.className = 'card-tempo ' + cls;
    }
  });
}

function mesaLabel(p) {
  if (p.mesas?.numero) return 'Mesa ' + p.mesas.numero;
  if (p.sessao_cliente) return p.sessao_cliente.replace('mesa_', 'Mesa ');
  return 'Mesa ?';
}

function cardHtml(p, status) {
  const agora   = Date.now();
  const inicio  = new Date(p.created_at).getTime();
  const mins    = Math.floor((agora - inicio) / 60000);
  const tempoClass = mins < 10 ? 'ok' : mins < 20 ? 'warn' : 'urgent';
  const tempoTxt   = mins < 60 ? mins + 'min' : Math.floor(mins/60) + 'h' + (mins%60 > 0 ? (mins%60) + 'm' : '');

  const itensHtml = (p.pedido_itens || []).map(it => {
    const removidos = (it.pedido_item_ingredientes || [])
      .filter(i => i.acao === 'remover')
      .map(i => i.nome_ingrediente);
    return `<div class="item-row">
      <div class="item-qty">${it.quantidade}×</div>
      <div class="item-info">
        <div class="item-nome">${it.nome_produto}</div>
        ${removidos.length ? `<div class="item-mods">✕ Sem: ${removidos.join(', ')}</div>` : ''}
        ${it.observacao ? `<div class="item-obs">📝 ${it.observacao}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const obsGeral = p.observacao_geral
    ? `<div class="card-obs">⚠️ ${p.observacao_geral}</div>` : '';

  const btn = btnAcao(p.id, status);

  return `<div class="card" id="card-${p.id}">
    <div class="card-head">
      <div class="card-mesa">${mesaLabel(p)}</div>
      <div class="card-meta">
        <span class="card-num">#${p.numero}</span>
        <span class="card-tempo ${tempoClass}">${tempoTxt}</span>
      </div>
    </div>
    <div class="card-itens">${itensHtml}</div>
    ${obsGeral}
    <div class="card-actions">${btn}</div>
  </div>`;
}

function btnAcao(id, status) {
  const proximos = {
    pendente:   { label: 'Confirmar →',     cls: 'btn-confirmar', next: 'confirmado'  },
    confirmado: { label: '▶ Iniciar preparo', cls: 'btn-preparo',   next: 'em_preparo' },
    em_preparo: { label: '✓ Marcar pronto',  cls: 'btn-pronto',    next: 'pronto'     },
    pronto:     { label: '✓ Entregue',       cls: 'btn-entregar',  next: 'entregue'   },
  };
  const acao = proximos[status];
  if (!acao) return '';
  return `<button class="btn-acao ${acao.cls}" onclick="avancar('${id}','${acao.next}',this)">
    ${acao.label}
  </button>`;
}

function vazioHtml(status) {
  const msgs = {
    pendente:   { icon: '✓', txt: 'Tudo em dia' },
    confirmado: { icon: '✓', txt: 'Nenhum esperando' },
    em_preparo: { icon: '🔥', txt: 'Nada no fogo' },
    pronto:     { icon: '🛎', txt: 'Nenhum aguardando' },
  };
  const m = msgs[status] || { icon: '✓', txt: '' };
  return `<div class="col-empty">
    <div class="col-empty-icon">${m.icon}</div>
    <div class="col-empty-txt">${m.txt}</div>
  </div>`;
}

/* ════════════════════════════════════════════
   AÇÕES
════════════════════════════════════════════ */
async function avancar(pedidoId, novoStatus, btn) {
  btn.disabled = true;
  btn.textContent = '...';

  // Timestamps automáticos
  const extra = { updated_at: new Date().toISOString() };
  if (novoStatus === 'em_preparo') extra.tempo_inicio_preparo = extra.updated_at;
  if (novoStatus === 'pronto')     extra.tempo_pronto         = extra.updated_at;
  if (novoStatus === 'entregue')   extra.tempo_entrega        = extra.updated_at;

  try {
    await supa(`/rest/v1/pedidos?id=eq.${pedidoId}`, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: novoStatus, ...extra })
    });
    // Anima saída do card imediatamente (feedback visual instantâneo)
    const card = document.getElementById('card-' + pedidoId);
    if (card) {
      card.style.transition = 'opacity .2s, transform .2s';
      card.style.opacity    = '0';
      card.style.transform  = 'scale(.95)';
      // Remove o card do estado anterior para evitar re-render no próximo poll
      delete pedidosAnteriores[pedidoId];
    }
    // Recarrega após animação — aguarda o fade antes de buscar
    await new Promise(r => setTimeout(r, 220));
    await carregar();
  } catch(e) {
    // Reabilita botão e mostra erro com auto-reset após 3s
    btn.textContent = '⚠ Erro — toque para tentar';
    btn.style.background = '#ef4444';
    setTimeout(() => {
      btn.disabled         = false;
      btn.style.background = '';
      btn.textContent      = 'Tentar novamente';
    }, 3000);
  }
}

/* ════════════════════════════════════════════
   NOTIF E ONLINE/OFFLINE
════════════════════════════════════════════ */
function dispararNotif(msg) {
  const el = document.getElementById('notif');
  el.textContent = '🔔 ' + msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 4000);
}

function setOnline() {
  tentativaErro = 0;
  document.getElementById('offline-bar').classList.remove('show');
  document.querySelector('.live-dot').style.background = '#2dbe6c';
}

function setOffline() {
  document.getElementById('offline-bar').classList.add('show');
  document.querySelector('.live-dot').style.background = '#ef4444';
}

init();
</script>
