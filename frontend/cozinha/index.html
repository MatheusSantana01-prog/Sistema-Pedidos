<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha - Sabor & Fogo</title>

  <!-- CSS Modularizado -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/items.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
</head>
<body>

<!-- Header com stats -->
<div class="header">
  <div class="header-left">
    <div class="live-dot"></div>
    <div class="brand">Kitchen Display System</div>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <div class="stat-label">Fila</div>
      <div class="stat-value" id="stat-fila">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Prontos</div>
      <div class="stat-value" id="stat-prontos">0</div>
    </div>
  </div>
  <div class="header-clock" id="clock">--:--</div>
</div>

<!-- Kanban Board -->
<div class="board" id="board">
  <!-- Coluna: Aguardando -->
  <div class="board-col" data-status="pendente">
    <div class="col-header">
      <span class="col-title">Aguardando</span>
      <span class="col-count" id="count-pendente">0</span>
    </div>
    <div class="col-cards" id="col-pendente"></div>
    <div class="col-empty">Nenhum pedido</div>
  </div>

  <!-- Coluna: Confirmado -->
  <div class="board-col" data-status="confirmado">
    <div class="col-header">
      <span class="col-title">Confirmado</span>
      <span class="col-count" id="count-confirmado">0</span>
    </div>
    <div class="col-cards" id="col-confirmado"></div>
    <div class="col-empty">Nenhum pedido</div>
  </div>

  <!-- Coluna: Em Preparo -->
  <div class="board-col" data-status="em_preparo">
    <div class="col-header">
      <span class="col-title">Em Preparo 🍳</span>
      <span class="col-count" id="count-em_preparo">0</span>
    </div>
    <div class="col-cards" id="col-em_preparo"></div>
    <div class="col-empty">Nenhum pedido</div>
  </div>

  <!-- Coluna: Pronto -->
  <div class="board-col" data-status="pronto">
    <div class="col-header">
      <span class="col-title">Pronto 🔔</span>
      <span class="col-count" id="count-pronto">0</span>
    </div>
    <div class="col-cards" id="col-pronto"></div>
    <div class="col-empty">Nenhum pedido</div>
  </div>
</div>

<!-- Offline Bar -->
<div class="offline-bar" id="offline-bar" style="display:none;">
  ⚠️ Sem conexão. Tentando reconectar...
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- JavaScript Modules -->
<script type="module">
  import { config } from './js/config.js';
  import { api, supa, rpc } from './js/api.js';
  import { state, updateState } from './js/state.js';
  import { showToast } from './js/utils.js';
  import { carregarBoard, renderBoard, updateCounts } from './js/board.js';
  import { avancarStatus } from './js/actions.js';
  import { iniciarPolling, playSound } from './js/notifications.js';

  // Expor globalmente
  window.app = {
    config,
    api,
    supa,
    rpc,
    state,
    updateState,
    utils: { showToast },
    board: { carregarBoard, renderBoard, updateCounts, avancarStatus },
    notifications: { iniciarPolling, playSound }
  };

  // Inicializar
  document.addEventListener('DOMContentLoaded', async () => {
    await carregarBoard();
    iniciarPolling();
    // Atualizar relógio
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'});
    }, 1000);
  });
</script>

</body>
</html>
