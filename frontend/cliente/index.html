<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cardápio - Sabor & Fogo</title>

  <!-- CSS Modularizado -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/search-categories.css">
  <link rel="stylesheet" href="css/products.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/fab-notifications.css">
  <link rel="stylesheet" href="css/utilities.css">
</head>
<body>

<!-- Estrutura HTML base -->
<div id="app">
  <!-- Hero Section -->
  <div class="hero">
    <div class="hero-top">
      <div class="brand">
        <div class="brand-icon">🍔</div>
        <div class="brand-name">Sabor & Fogo</div>
      </div>
      <div class="mesa-tag">Mesa <span id="mesa-num">—</span></div>
    </div>
    <div class="hero-content">
      <div class="hero-greeting">Olá! Bem-vindo 👋</div>
      <div class="hero-title">O que vai <em>rolar hoje?</em></div>
      <div class="hero-stats">
        <div class="stat">
          <div class="stat-val" id="stat-itens">0</div>
          <div class="stat-label">No pedido</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-tempo">—</div>
          <div class="stat-label">Min. estimados</div>
        </div>
        <div class="stat clickable" onclick="window.app.conta.abrirConta()">
          <div class="stat-val" id="stat-consumido">R$0</div>
          <div class="stat-label">Consumido 👆</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Busca -->
  <div class="search-wrap">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Buscar no cardápio...">
      <button class="search-clear" id="search-clear">✕</button>
    </div>
  </div>

  <!-- Categorias -->
  <div class="cats-section">
    <div class="cats-label">Categorias</div>
    <div class="cats" id="cats"></div>
  </div>

  <!-- Destaques -->
  <div class="destaques-section" id="dest-section" style="display:none;">
    <div class="section-head"><h2>⭐ Destaques</h2></div>
    <div class="destaques-scroll" id="destaques"></div>
  </div>

  <!-- Produtos -->
  <div id="produtos-wrap" style="padding-bottom:110px;"></div>

  <!-- FAB Carrinho -->
  <button class="cart-fab" id="cart-fab" onclick="window.app.carrinho.abrirCarrinho()">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="fab-badge" id="fab-qty">0</div>
      <span>Ver Pedido</span>
    </div>
    <div class="fab-price" id="fab-price">R$ 0,00</div>
  </button>

  <!-- FAB Conta -->
  <button class="conta-fab" id="conta-fab" onclick="window.app.conta.abrirConta()">
    <div class="pulse-dot"></div>
    <span>Minha conta</span>
  </button>
</div>

<!-- Notificações -->
<div class="toast" id="toast"></div>

<!-- JavaScript Modules -->
<script type="module">
  import { config } from './js/config.js';
  import { api, supa, rpc } from './js/api.js';
  import { state, updateState } from './js/state.js';
  import { fmt, emoji, showToast } from './js/utils.js';
  import { carregarCardapio, renderProdutos, buscar } from './js/cardapio.js';
  import { abrirCarrinho, fecharCarrinho, renderCarrinho, atualizarUI } from './js/carrinho.js';
  import { confirmarPedido } from './js/pedidos.js';
  import { abrirConta, fecharConta, carregarConta } from './js/conta-mesa.js';
  import { mostrarNotificacao, iniciarPolling } from './js/notifications.js';

  // Expor globalmente
  window.app = {
    config,
    api,
    supa,
    rpc,
    state,
    updateState,
    utils: { fmt, emoji, showToast },
    cardapio: { carregarCardapio, renderProdutos, buscar },
    carrinho: { abrirCarrinho, fecharCarrinho, renderCarrinho, atualizarUI, confirmarPedido },
    conta: { abrirConta, fecharConta, carregarConta },
    notifications: { mostrarNotificacao, iniciarPolling }
  };

  // Inicializar app
  document.addEventListener('DOMContentLoaded', async () => {
    await carregarCardapio();
    iniciarPolling();
  });
</script>

</body>
</html>
