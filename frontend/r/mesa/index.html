<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary:   #ff4d1c;
  --color-secondary: #1a1a1a;
  --color-accent:    #ff6b3d;
  --color-bg:        #0a0a0a;
  --color-text:      #f2f0eb;
  --panel:    #111;
  --border:   #1e1e1e;
  --muted:    #666;
  --green:    #22c55e;
  --red:      #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--color-bg); color:var(--color-text); font-family:'Inter',sans-serif; min-height:100vh; max-width:480px; margin:0 auto; position:relative; }

/* HEADER */
.header { background:var(--panel); padding:16px 20px 12px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.header-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.header-logo { width:40px; height:40px; border-radius:8px; background:var(--border); object-fit:cover; flex-shrink:0; }
.header-nome { font-size:16px; font-weight:700; }
.header-mesa { font-size:12px; color:var(--muted); }

/* BUSCA */
.search-wrap { padding:0 20px 12px; background:var(--panel); }
.search-box { display:flex; align-items:center; gap:8px; background:var(--color-bg); border:1px solid var(--border); border-radius:10px; padding:0 12px; }
.search-box input { flex:1; background:none; border:none; outline:none; padding:10px 0; font-size:14px; color:var(--color-text); }
.search-box input::placeholder { color:var(--muted); }
.search-clear { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; display:none; }
.search-clear.show { display:block; }

/* CATEGORIAS */
.cats-wrap { padding:12px 20px; overflow-x:auto; scrollbar-width:none; background:var(--panel); border-bottom:1px solid var(--border); }
.cats-wrap::-webkit-scrollbar { display:none; }
.cats { display:flex; gap:8px; }
.cat-pill { padding:6px 14px; border-radius:999px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; transition:all .15s; }
.cat-pill.active { background:var(--color-primary); border-color:var(--color-primary); color:#fff; }

/* DESTAQUES */
.dest-wrap { padding:16px 20px 0; }
.dest-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:10px; }
.dest-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.dest-card { background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; transition:transform .15s; }
.dest-card:active { transform:scale(.98); }
.dest-card img { width:100%; height:100px; object-fit:cover; }
.dest-card-img-placeholder { width:100%; height:100px; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:32px; }
.dest-card-body { padding:10px; }
.dest-card-nome { font-size:13px; font-weight:600; }
.dest-card-preco { font-size:12px; color:var(--color-primary); font-weight:700; margin-top:2px; }

/* PRODUTOS */
.produtos-wrap { padding:16px 20px; }
.cat-section { margin-bottom:24px; }
.cat-section-title { font-size:14px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:6px; color:var(--color-text); }
.produto-card { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); cursor:pointer; align-items:flex-start; }
.produto-card:last-child { border-bottom:none; }
.produto-img { width:70px; height:70px; border-radius:8px; background:var(--border); object-fit:cover; flex-shrink:0; }
.produto-img-placeholder { width:70px; height:70px; border-radius:8px; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; }
.produto-info { flex:1; min-width:0; }
.produto-nome { font-size:14px; font-weight:600; margin-bottom:3px; }
.produto-desc { font-size:12px; color:var(--muted); line-height:1.4; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.produto-preco { font-size:15px; font-weight:700; color:var(--color-primary); }
.produto-ind  { font-size:11px; color:var(--muted); font-style:italic; }
.produto-add  { width:32px; height:32px; border-radius:50%; background:var(--color-primary); border:none; color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; align-self:center; transition:transform .1s; }
.produto-add:active { transform:scale(.9); }
.produto-add:disabled { background:var(--border); cursor:not-allowed; }

/* CARRINHO FAB */
.cart-fab { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--color-primary); color:#fff; padding:14px 24px; border-radius:999px; font-size:15px; font-weight:700; border:none; cursor:pointer; z-index:200; display:none; align-items:center; gap:10px; box-shadow:0 8px 32px rgba(255,77,28,.4); transition:all .3s; white-space:nowrap; }
.cart-fab.show { display:flex; }
.cart-count { background:#fff; color:var(--color-primary); border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; }

/* MODAL */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300; display:none; align-items:flex-end; }
.modal-bg.show { display:flex; }
.modal { background:var(--panel); border-radius:20px 20px 0 0; width:100%; max-height:92vh; overflow-y:auto; padding:24px 20px 32px; }
.modal-drag { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
.modal-title { font-size:18px; font-weight:700; margin-bottom:4px; }
.modal-desc  { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:16px; }
.modal-preco { font-size:20px; font-weight:700; color:var(--color-primary); margin-bottom:20px; }
.modal-section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:10px; }
.mod-item { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; }
.mod-item:last-child { border-bottom:none; }
.mod-check { width:20px; height:20px; border-radius:4px; border:2px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; }
.mod-check.checked { background:var(--color-primary); border-color:var(--color-primary); }
.obs-input { width:100%; background:var(--color-bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--color-text); font-size:14px; font-family:'Inter',sans-serif; resize:none; outline:none; margin-top:12px; }
.qty-control { display:flex; align-items:center; gap:16px; margin:20px 0; }
.qty-btn { width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--color-text); font-size:20px; cursor:pointer; }
.qty-num { font-size:20px; font-weight:700; min-width:24px; text-align:center; }
.btn-add-cart { width:100%; padding:15px; background:var(--color-primary); border:none; border-radius:12px; color:#fff; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; }

/* CONTA */
.conta-wrap { padding:20px; }
.conta-item { display:flex; justify-content:space-between; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--border); font-size:14px; }
.conta-total { display:flex; justify-content:space-between; align-items:center; padding:16px 0; font-size:18px; font-weight:700; }
.pgto-opts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
.pgto-btn-opt { padding:12px; border:1px solid var(--border); border-radius:8px; background:transparent; color:var(--muted); font-size:13px; font-weight:500; cursor:pointer; text-align:center; transition:all .15s; }
.pgto-btn-opt.sel { border-color:var(--green); background:rgba(34,197,94,.1); color:var(--green); }
.btn-fechar-conta { width:100%; padding:15px; background:var(--green); border:none; border-radius:12px; color:#fff; font-size:16px; font-weight:700; cursor:pointer; margin-top:12px; }
.btn-fechar-conta:disabled { opacity:.4; cursor:not-allowed; }

/* CONFIRMAR PEDIDO */
.confirm-modal { background:var(--panel); border-radius:20px 20px 0 0; width:100%; padding:24px 20px 32px; }
.carrinho-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; }
.carrinho-total { display:flex; justify-content:space-between; font-size:17px; font-weight:700; padding:12px 0; }
.btn-enviar { width:100%; padding:15px; background:var(--color-primary); border:none; border-radius:12px; color:#fff; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; }

/* TOAST */
.toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--panel); border:1px solid var(--border); padding:12px 20px; border-radius:999px; font-size:14px; font-weight:600; z-index:999; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; color:var(--color-text); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.success { border-color:var(--green); }
.toast.error   { border-color:var(--red); }

/* SUCESSO */
.sucesso-overlay { position:fixed; inset:0; background:var(--color-bg); z-index:400; display:none; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
.sucesso-overlay.show { display:flex; }
.sucesso-icon { font-size:72px; }
.sucesso-title { font-size:24px; font-weight:700; }
.sucesso-sub { font-size:15px; color:var(--muted); text-align:center; max-width:280px; line-height:1.5; }
</style>
</head>
<body>

<div id="app" style="display:none;">
  <div class="header">
    <div class="header-top">
      <img class="header-logo restaurant-logo" src="" alt="" style="display:none;">
      <div>
        <div class="header-nome restaurant-name"></div>
        <div class="header-mesa" id="header-mesa">Mesa —</div>
      </div>
    </div>
    <div class="search-wrap" style="padding:0 0 0;">
      <div class="search-box">
        <span style="color:var(--muted);font-size:16px;">🔍</span>
        <input type="text" id="search-input" placeholder="Buscar no cardápio..."
               oninput="buscar(this.value)">
        <button class="search-clear" id="search-clear" onclick="limparBusca()">✕</button>
      </div>
    </div>
  </div>

  <div class="cats-wrap">
    <div class="cats" id="cats"></div>
  </div>

  <div id="destaques-wrap"></div>

  <div class="produtos-wrap" id="produtos-wrap"></div>
</div>

<!-- FAB CARRINHO -->
<button class="cart-fab" id="cart-fab" onclick="abrirCarrinho()">
  🛒 Ver carrinho
  <span class="cart-count" id="cart-count">0</span>
</button>

<!-- MODAL PRODUTO -->
<div class="modal-bg" id="modal-produto">
  <div class="modal">
    <div class="modal-drag"></div>
    <div id="modal-produto-img" style="width:100%;height:180px;border-radius:12px;background:var(--border);margin-bottom:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:64px;"></div>
    <div class="modal-title" id="modal-nome"></div>
    <div class="modal-desc"  id="modal-desc"></div>
    <div class="modal-preco" id="modal-preco"></div>
    <div id="modal-ings"></div>
    <div style="margin-top:12px;">
      <div class="modal-section-title">Observações (opcional)</div>
      <textarea class="obs-input" id="modal-obs" rows="2" placeholder="Ex: bem passado, sem sal..."></textarea>
    </div>
    <div class="qty-control">
      <button class="qty-btn" onclick="mudarQty(-1)">−</button>
      <div class="qty-num" id="modal-qty">1</div>
      <button class="qty-btn" onclick="mudarQty(1)">+</button>
    </div>
    <button class="btn-add-cart" onclick="adicionarAoCarrinho()">Adicionar · R$ <span id="modal-total">0,00</span></button>
  </div>
</div>

<!-- MODAL CARRINHO / CONFIRMAR -->
<div class="modal-bg" id="modal-carrinho">
  <div class="confirm-modal">
    <div class="modal-drag"></div>
    <div style="font-size:18px;font-weight:700;margin-bottom:16px;">🛒 Seu pedido</div>
    <div id="carrinho-itens"></div>
    <div class="carrinho-total">
      <span>Total</span>
      <span id="carrinho-total-val">R$ 0,00</span>
    </div>
    <div style="margin-bottom:12px;">
      <div class="modal-section-title">Observação geral (opcional)</div>
      <textarea class="obs-input" id="obs-geral" rows="2" placeholder="Ex: alergia a amendoim..."></textarea>
    </div>
    <button class="btn-enviar" onclick="enviarPedido()">✓ Enviar pedido</button>
    <button style="width:100%;padding:12px;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;margin-top:8px;" onclick="fecharModal('modal-carrinho')">Continuar comprando</button>
  </div>
</div>

<!-- MODAL CONTA -->
<div class="modal-bg" id="modal-conta">
  <div class="modal">
    <div class="modal-drag"></div>
    <div style="font-size:18px;font-weight:700;margin-bottom:16px;">🧾 Minha conta</div>
    <div id="conta-conteudo"><div style="padding:32px;text-align:center;color:var(--muted)">Carregando...</div></div>
  </div>
</div>

<!-- SUCESSO -->
<div class="sucesso-overlay" id="sucesso-overlay">
  <div class="sucesso-icon">✅</div>
  <div class="sucesso-title">Pedido enviado!</div>
  <div class="sucesso-sub">Seu pedido foi recebido. Acompanhe o status aqui.</div>
  <button style="padding:12px 28px;background:var(--color-primary);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;" onclick="fecharSucesso()">Ver cardápio</button>
</div>

<div class="toast" id="toast"></div>

<script src="../../shared/config.js"></script>
<script src="../../shared/tenant.js"></script>
<script src="../../shared/auth.js"></script>
<script>
let RESTAURANT   = null;
let MESA         = null;
let SESSAO_ID    = null;
let categorias   = [];
let todosProdutos = [];
let carrinho     = [];
let prodAtual    = null;
let modsSelecionadas = {};
let pollingConta = null;

/* ── INIT ───────────────────────────────────────────── */
async function init() {
  // 1. Resolver restaurante pelo slug
  RESTAURANT = await initTenant();
  if (!RESTAURANT) return;

  // 2. Buscar mesa pelo token na URL
  // URL: /r/{slug}/mesa/{token}
  const path  = window.location.pathname;
  const match = path.match(/\/mesa\/([^\/]+)/);
  const token = match ? match[1] : new URLSearchParams(window.location.search).get('mesa');

  if (!token) {
    showToast('Mesa não identificada', 'error'); return;
  }

  try {
    const slug = getCurrentRestaurantSlug();
    // Validar mesa via API
    const resp = await apiPublic('GET', `/api/public/restaurants/${slug}/tables/${token}`);
    MESA = resp.mesa;
    document.getElementById('header-mesa').textContent = `Mesa ${MESA.numero}`;

    // Abrir/recuperar sessão
    const sessResp = await apiPublic('POST', `/api/public/restaurants/${slug}/tables/${token}/sessions`);
    SESSAO_ID = sessResp.sessao?.id;

    document.getElementById('app').style.display = 'block';
    carregarCardapio();
    iniciarPollingConta();
  } catch (e) {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;background:var(--color-bg);color:var(--color-text);font-family:sans-serif;">
        <div style="font-size:48px;">🚫</div>
        <h2>Mesa não encontrada</h2>
        <p style="color:var(--muted)">Escaneie o QR Code da mesa novamente.</p>
      </div>`;
  }
}

/* ── CARDÁPIO ────────────────────────────────────────── */
async function carregarCardapio() {
  try {
    const slug = getCurrentRestaurantSlug();
    const { cardapio } = await apiPublic('GET', `/api/public/restaurants/${slug}/menu`);
    categorias = (cardapio || []).filter(c => c.produtos?.length);
    todosProdutos = categorias.flatMap(c => c.produtos || []);
    renderCats();
    renderDestaques();
    renderProdutos(categorias);
  } catch (e) {
    showToast('Erro ao carregar cardápio', 'error');
  }
}

function renderCats() {
  const el = document.getElementById('cats');
  el.innerHTML = '<button class="cat-pill active" onclick="filtrarCat(this,null)">Tudo</button>';
  categorias.forEach(c => {
    el.innerHTML += `<button class="cat-pill" onclick="filtrarCat(this,'${c.id}')">${c.icone||''} ${c.nome}</button>`;
  });
}

function filtrarCat(btn, id) {
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProdutos(id ? categorias.filter(c => c.id === id) : categorias);
  document.getElementById('produtos-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderDestaques() {
  const dest = todosProdutos.filter(p => p.destaque && p.disponivel !== false);
  const wrap = document.getElementById('destaques-wrap');
  if (!dest.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = `<div class="dest-wrap">
    <div class="dest-label">⭐ Destaques</div>
    <div class="dest-grid">
      ${dest.slice(0,4).map(p => `
        <div class="dest-card" onclick="abrirProduto('${p.id}')">
          ${p.foto_url
            ? `<img src="${p.foto_url}" alt="${p.nome}" loading="lazy">`
            : `<div class="dest-card-img-placeholder">${emoji(p.nome)}</div>`}
          <div class="dest-card-body">
            <div class="dest-card-nome">${p.nome}</div>
            <div class="dest-card-preco">R$ ${fmt(p.preco)}</div>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderProdutos(cats) {
  const wrap = document.getElementById('produtos-wrap');
  if (!cats.length) { wrap.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted)">Nenhum produto encontrado</div>'; return; }
  wrap.innerHTML = cats.map(c => `
    <div class="cat-section" id="cat-${c.id}">
      <div class="cat-section-title">${c.icone||''} ${c.nome}</div>
      ${(c.produtos||[]).map(p => `
        <div class="produto-card" onclick="${p.disponivel!==false?`abrirProduto('${p.id}')`:''}" style="${p.disponivel===false?'opacity:.4':''}">
          ${p.foto_url
            ? `<img class="produto-img" src="${p.foto_url}" alt="${p.nome}" loading="lazy">`
            : `<div class="produto-img-placeholder">${emoji(p.nome)}</div>`}
          <div class="produto-info">
            <div class="produto-nome">${p.nome}</div>
            ${p.descricao?`<div class="produto-desc">${p.descricao}</div>`:''}
            <div class="${p.disponivel===false?'produto-ind':'produto-preco'}">${p.disponivel===false?'Indisponível':'R$ '+fmt(p.preco)}</div>
          </div>
          ${p.disponivel!==false?`<button class="produto-add" onclick="event.stopPropagation();adicionarRapido('${p.id}')">+</button>`:''}
        </div>`).join('')}
    </div>`).join('');
}

function buscar(q) {
  const clear = document.getElementById('search-clear');
  clear.classList.toggle('show', q.length > 0);
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  if (!q.trim()) {
    document.querySelector('.cat-pill')?.classList.add('active');
    renderProdutos(categorias); return;
  }
  const t = q.toLowerCase();
  const res = todosProdutos.filter(p => p.disponivel!==false &&
    (p.nome.toLowerCase().includes(t) || (p.descricao||'').toLowerCase().includes(t)));
  renderProdutos([{ id:'s', nome:`Resultados (${res.length})`, icone:'🔍', produtos: res }]);
  document.getElementById('produtos-wrap').scrollIntoView({ behavior:'smooth', block:'start' });
}

function limparBusca() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('show');
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  document.querySelector('.cat-pill')?.classList.add('active');
  renderProdutos(categorias);
}

/* ── PRODUTO MODAL ───────────────────────────────────── */
function abrirProduto(id) {
  prodAtual = todosProdutos.find(p => p.id === id);
  if (!prodAtual) return;
  modsSelecionadas = {};
  document.getElementById('modal-qty').textContent = '1';
  document.getElementById('modal-nome').textContent = prodAtual.nome;
  document.getElementById('modal-desc').textContent = prodAtual.descricao || '';
  document.getElementById('modal-preco').textContent = 'R$ ' + fmt(prodAtual.preco);
  document.getElementById('modal-total').textContent = fmt(prodAtual.preco);
  document.getElementById('modal-obs').value = '';

  const imgEl = document.getElementById('modal-produto-img');
  if (prodAtual.foto_url) {
    imgEl.innerHTML = `<img src="${prodAtual.foto_url}" alt="${prodAtual.nome}" style="width:100%;height:100%;object-fit:cover;">`;
  } else {
    imgEl.innerHTML = `<span style="font-size:64px;">${emoji(prodAtual.nome)}</span>`;
  }

  const ings = prodAtual.ings || [];
  document.getElementById('modal-ings').innerHTML = ings.length ? `
    <div class="modal-section-title" style="margin-top:16px;">Ingredientes</div>
    ${ings.map(ing => `
      <div class="mod-item" onclick="toggleMod('${ing}')">
        <span>${ing}</span>
        <div class="mod-check checked" id="mod-${ing.replace(/\s/g,'-')}">✓</div>
      </div>`).join('')}` : '';

  document.getElementById('modal-produto').classList.add('show');
}

function toggleMod(nome) {
  modsSelecionadas[nome] = !modsSelecionadas[nome];
  const el = document.getElementById('mod-' + nome.replace(/\s/g, '-'));
  if (el) {
    if (modsSelecionadas[nome]) { el.classList.remove('checked'); el.textContent = ''; }
    else { el.classList.add('checked'); el.textContent = '✓'; }
  }
}

function mudarQty(delta) {
  const el  = document.getElementById('modal-qty');
  const qty = Math.max(1, parseInt(el.textContent) + delta);
  el.textContent = qty;
  document.getElementById('modal-total').textContent = fmt(prodAtual.preco * qty);
}

function adicionarAoCarrinho() {
  const qty  = parseInt(document.getElementById('modal-qty').textContent);
  const obs  = document.getElementById('modal-obs').value.trim();
  const ings = Object.entries(modsSelecionadas).filter(([,r]) => r).map(([n]) => n);
  carrinho.push({
    produto_id:      prodAtual.id,
    nome_produto:    prodAtual.nome,
    preco_unitario:  prodAtual.preco,
    quantidade:      qty,
    subtotal:        prodAtual.preco * qty,
    observacao:      obs || null,
    ingredientes:    ings.map(n => ({ nome_ingrediente: n, acao: 'remover' })),
  });
  fecharModal('modal-produto');
  atualizarFAB();
  showToast(`${qty}× ${prodAtual.nome} adicionado`, 'success');
}

function adicionarRapido(id) {
  const p = todosProdutos.find(x => x.id === id);
  if (!p) return;
  carrinho.push({ produto_id:p.id, nome_produto:p.nome, preco_unitario:p.preco, quantidade:1, subtotal:p.preco, observacao:null, ingredientes:[] });
  atualizarFAB();
  showToast(`${p.nome} adicionado`, 'success');
}

function atualizarFAB() {
  const total = carrinho.reduce((a, i) => a + i.quantidade, 0);
  const fab   = document.getElementById('cart-fab');
  document.getElementById('cart-count').textContent = total;
  fab.classList.toggle('show', total > 0);
}

/* ── CARRINHO ────────────────────────────────────────── */
function abrirCarrinho() {
  const total = carrinho.reduce((a, i) => a + i.subtotal, 0);
  document.getElementById('carrinho-itens').innerHTML = carrinho.map((it, idx) => `
    <div class="carrinho-item">
      <div style="flex:1">
        <div style="font-weight:500">${it.quantidade}× ${it.nome_produto}</div>
        ${it.ingredientes?.length ? `<div style="font-size:12px;color:var(--muted)">Sem: ${it.ingredientes.map(i=>i.nome_ingrediente).join(', ')}</div>` : ''}
        ${it.observacao ? `<div style="font-size:12px;color:var(--muted)">${it.observacao}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:14px;font-weight:600;color:var(--color-primary)">R$ ${fmt(it.subtotal)}</span>
        <button onclick="removerItem(${idx})" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>
      </div>
    </div>`).join('');
  document.getElementById('carrinho-total-val').textContent = 'R$ ' + fmt(total);
  document.getElementById('obs-geral').value = '';
  document.getElementById('modal-carrinho').classList.add('show');
}

function removerItem(idx) {
  carrinho.splice(idx, 1);
  if (!carrinho.length) { fecharModal('modal-carrinho'); atualizarFAB(); return; }
  abrirCarrinho();
  atualizarFAB();
}

async function enviarPedido() {
  if (!carrinho.length) return;
  const btn   = document.querySelector('.btn-enviar');
  const obsG  = document.getElementById('obs-geral').value.trim();
  const total = carrinho.reduce((a, i) => a + i.subtotal, 0);
  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    const slug = getCurrentRestaurantSlug();
    await apiPublic('POST', `/api/public/restaurants/${slug}/orders`, {
      restaurant_id:     RESTAURANT.id,
      mesa_id:           MESA.id,
      sessao_mesa_id:    SESSAO_ID,
      subtotal:          total,
      total:             total,
      observacao_geral:  obsG || null,
      itens:             carrinho,
    });
    carrinho = [];
    fecharModal('modal-carrinho');
    atualizarFAB();
    document.getElementById('sucesso-overlay').classList.add('show');
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '✓ Enviar pedido';
  }
}

function fecharSucesso() {
  document.getElementById('sucesso-overlay').classList.remove('show');
}

/* ── CONTA ───────────────────────────────────────────── */
async function verConta() {
  document.getElementById('modal-conta').classList.add('show');
  document.getElementById('conta-conteudo').innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted)">Carregando...</div>';
  try {
    const slug = getCurrentRestaurantSlug();
    const data = await apiPublic('GET', `/api/public/restaurants/${slug}/sessions/${SESSAO_ID}/bill`);
    const pedidos = data.pedidos || [];
    const total   = pedidos.reduce((a, p) => a + Number(p.total), 0);

    if (data.sessao_status === 'fechada') {
      document.getElementById('conta-conteudo').innerHTML = `
        <div style="text-align:center;padding:32px;"><div style="font-size:48px;margin-bottom:12px">✅</div>
        <div style="font-size:18px;font-weight:700">Conta fechada</div>
        <div style="color:var(--muted);margin-top:8px">Obrigado pela visita!</div></div>`;
      return;
    }

    document.getElementById('conta-conteudo').innerHTML = `
      ${pedidos.map(p => `
        <div style="margin-bottom:12px;">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">Pedido #${p.numero}</div>
          ${(p.itens||[]).map(it => `
            <div class="conta-item">
              <span>${it.quantidade}× ${it.nome_produto}</span>
              <span style="font-family:monospace;font-weight:600">R$ ${fmt(it.subtotal)}</span>
            </div>`).join('')}
        </div>`).join('')}
      <div class="conta-total">
        <span>Total</span>
        <span style="color:var(--color-primary)">R$ ${fmt(total)}</span>
      </div>
      ${RESTAURANT.settings?.allow_table_close_request ? `
        <div style="margin-top:8px;font-size:13px;color:var(--muted);text-align:center">
          Peça ao garçom para fechar sua conta.
        </div>` : ''}`;
  } catch (e) {
    document.getElementById('conta-conteudo').innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted)">Erro ao carregar conta.</div>';
  }
}

function iniciarPollingConta() {
  async function verificar() {
    if (!SESSAO_ID) return;
    try {
      const slug = getCurrentRestaurantSlug();
      const data = await apiPublic('GET', `/api/public/restaurants/${slug}/sessions/${SESSAO_ID}/bill`);
      if (data.sessao_status === 'fechada') {
        clearTimeout(pollingConta);
        mostrarContaFechada();
        return;
      }
    } catch(e) {}
    pollingConta = setTimeout(verificar, window.SAAS_CONFIG.POLL_CLIENTE);
  }
  pollingConta = setTimeout(verificar, window.SAAS_CONFIG.POLL_CLIENTE);
}

function mostrarContaFechada() {
  document.getElementById('cart-fab').classList.remove('show');
  showToast('✅ Conta fechada pelo caixa. Obrigado!', 'success');
  const btn = document.querySelector('.btn-enviar');
  if (btn) btn.disabled = true;
}

/* ── UTILS ───────────────────────────────────────────── */
function fmt(n) { return Number(n).toFixed(2).replace('.', ','); }

function emoji(nome) {
  const n = (nome||'').toLowerCase();
  if (n.includes('pizza'))                return '🍕';
  if (n.includes('burguer')||n.includes('smash')||n.includes('hambur')) return '🍔';
  if (n.includes('frango')||n.includes('chicken')) return '🍗';
  if (n.includes('batata')||n.includes('frita'))   return '🍟';
  if (n.includes('shake')||n.includes('milk'))     return '🥤';
  if (n.includes('suco'))                return '🍊';
  if (n.includes('refri')||n.includes('coca'))     return '🥃';
  if (n.includes('brownie')||n.includes('sobr'))   return '🍫';
  if (n.includes('combo'))               return '🎁';
  return '🍽️';
}

function showToast(msg, tipo = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (tipo ? ' ' + tipo : '') + ' show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

function fecharModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-bg').forEach(b =>
  b.addEventListener('click', e => { if (e.target === b) b.classList.remove('show'); }));

init();
</script>
</body>
</html>
